<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default("dark") }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Usage Dashboard - CrofAI</title>

    <link rel="stylesheet" href="/ui/crofui.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      html,
      body {
        background: var(--dark-background, #0f0f0f);
        color: var(--text, #e5e5e5);
        margin: 0;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      }

      .page {
        width: 100%;
      }

      header.dashboard-header {
        margin-top: 25px;
        margin-left: 15vw;
        margin-bottom: 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-right: 15vw;
      }

      .dashboard-title {
        font-size: 2rem;
        color: var(--bright-text);
        text-decoration: none;
      }

      .dashboard-subtitle {
        color: var(--bright-text);
        opacity: 0.8;
        margin-top: 6px;
        font-size: 0.95rem;
      }

      /* Stamp Selector Styling */
      .stamp-container {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }

      .stamp-select {
        background: var(--palette-bg-5);
        color: white;
        border: 1px solid var(--border);
        padding: 8px 12px;
        border-radius: 8px;
        outline: none;
        cursor: pointer;
        font-size: 0.9rem;
        transition: 0.3s;
      }

      .stamp-select:hover {
        border-color: #4CAF50;
      }

      /* Top stat boxes */
      .top-stats {
        width: 100%;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 25px;
        margin-top: 10px;
      }

      .top-stats .stat-box {
        width: 20%;
        min-width: 220px;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 30px;
        transition: 0.3s ease;
        animation: fadeInUp 0.6s ease-out both;
      }

      .top-stats .stat-box:hover {
        background: var(--dark-background);
      }

      .top-stats pretty {
        color: var(--bright-text);
        font-size: 1.8rem;
      }

      .revenue-box {
        background: rgba(30, 60, 90, 0.3);
        border: 1px solid rgba(60, 120, 180, 0.4);
      }

      .revenue-value {
        color: #4CAF50;
        font-size: 1.8rem;
      }

      @media (max-width: 800px) {
        .top-stats .stat-box {
          width: 90%;
        }
        header.dashboard-header {
            flex-direction: column;
            align-items: flex-start;
            padding-right: 0;
        }
        .stamp-container {
            align-items: flex-start;
            margin-top: 15px;
        }
      }

      /* Models grid */
      .models-section {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 60px;
      }

      .models-grid {
        width: 100%;
        max-width: 1050px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 18px;
      }

      .model-box {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
        transition: 0.3s ease;
        background: transparent;
        animation: fadeInUp 0.6s ease-out both;
      }

      .model-box:hover {
        background: var(--dark-background);
      }

      .model-name {
        color: var(--bright-text);
        font-weight: 600;
        margin-bottom: 10px;
        word-break: break-word;
      }

      .model-tokens {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }

      .model-tokens .item {
        border: 1px solid var(--border);
        background: var(--background);
        border-radius: 9px;
        padding: 10px;
        transition: 0.3s ease;
      }

      .label {
        color: var(--bright-text);
        font-size: 0.85rem;
        opacity: 0.85;
      }

      .value {
        margin-top: 4px;
        font-weight: 600;
        color: var(--text);
      }

      .revenue-section {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .revenue-item {
        display: flex;
        justify-content: space-between;
        margin-top: 4px;
      }

      .revenue-label {
        color: var(--bright-text);
        opacity: 0.85;
        font-size: 0.85rem;
      }

      .revenue-amount {
        font-weight: 600;
        color: #4CAF50;
      }

      .total-line {
        border-top: 1px solid var(--border);
        margin-top: 12px;
        padding-top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .muted {
        color: var(--bright-text);
        opacity: 0.75;
        font-size: 0.9rem;
      }

      .updated {
        width: 100%;
        text-align: center;
        color: var(--bright-text);
        opacity: 0.75;
        margin: 25px 0 40px 0;
        font-size: 0.9rem;
      }

      .loading,
      .error {
        width: 100%;
        display: flex;
        justify-content: center;
        margin: 20px 0;
        color: var(--bright-text);
      }

      .error {
        color: #f87171;
      }

      .chart-section {
        width: 100%;
        display: flex;
        justify-content: center;
        margin: 40px 0;
      }

      .chart-card {
        border: 1px solid var(--border);
        background: var(--palette-bg-2);
        border-radius: 15px;
        padding: 15px;
        width: 90%;
        max-width: 675px;
        margin: 0 auto;
        animation: fadeInUp 0.6s ease-out both;
      }

      .chart-title {
        color: var(--bright-text);
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .chart-toggle {
        display: flex;
        gap: 8px;
      }

      .chart-toggle button {
        background: var(--palette-overlay-2);
        border: 1px solid var(--palette-bg-6);
        color: var(--bright);
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
      }

      .chart-toggle button.active {
        background: rgba(76, 175, 80, 0.3);
        border-color: rgba(76, 175, 80, 0.5);
      }

      .chart-wrap {
        position: relative;
        width: 100%;
        height: 360px;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header class="dashboard-header">
        <div>
          <a href="/admin" class="dashboard-title">Admin</a>
          <div class="dashboard-subtitle">
            Monitor model consumption and revenue history
          </div>
        </div>
        <div class="stamp-container">
            <span class="label" style="margin-bottom: 5px;">Time Period</span>
            <select id="stamp-selector" class="stamp-select" onchange="updateDashboard()">
                <option value="current">Current Usage</option>
            </select>
        </div>
      </header>

      <section class="top-stats">
        <div class="stat-box">
          Monthly Active Users:
          <br />
          <pretty id="mau-count">0</pretty>
        </div>

        <div class="stat-box">
          Total Tokens Across All Models:
          <br />
          <pretty id="grand-total">0</pretty>
        </div>

        <div class="stat-box">
          Models Tracked:
          <br />
          <pretty id="model-count">0</pretty>
        </div>

        <div class="stat-box revenue-box">
          Estimated Revenue:
          <br />
          <pretty id="grand-revenue" class="revenue-value">$0.00</pretty>
        </div>
      </section>

      <section class="chart-section">
        <div class="chart-card">
          <div class="chart-title">
            <span>Usage and Revenue Comparison</span>
            <div class="chart-toggle">
              <button id="token-btn" class="active" onclick="switchChart('tokens')">Tokens</button>
              <button id="revenue-btn" onclick="switchChart('revenue')">Revenue</button>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="tokenChart"></canvas>
          </div>
        </div>
      </section>

      <section class="models-section">
        <div id="models-grid" class="models-grid">
          <div class="loading">Loading data...</div>
        </div>
      </section>

      <div class="updated">
        Last updated:
        <span id="update-time">—</span>
      </div>
    </div>

    <script>
      let tokenChart = null;
      let currentChartType = 'tokens';
      let modelPricing = {};

      Chart.defaults.color = "#ffffff";

      async function fetchStamps() {
        try {
            const res = await fetch('/admin-api/stamps');
            if (!res.ok) return;
            const stamps = await res.json();
            const selector = document.getElementById('stamp-selector');

            stamps.forEach(stamp => {
                const opt = document.createElement('option');
                opt.value = stamp;
                opt.textContent = stamp.replace('usagestamp_', '');
                selector.appendChild(opt);
            });
        } catch (e) {
            console.error("Error fetching stamps:", e);
        }
      }

      async function fetchModelPricing() {
        try {
          const response = await fetch('/v2/models');
          if (!response.ok) return {};
          const data = await response.json();
          const pricingMap = {};
          data.data.forEach(model => {
            pricingMap[model.id] = {
              prompt: parseFloat(model.pricing?.prompt || '0'),
              completion: parseFloat(model.pricing?.completion || '0')
            };
          });
          return pricingMap;
        } catch (error) {
          return {};
        }
      }

      function calculateRevenue(modelData, pricing) {
        const inputTokens = modelData.input_tokens || 0;
        const outputTokens = modelData.output_tokens || 0;
        return {
          total: (inputTokens * pricing.prompt) + (outputTokens * pricing.completion),
          breakdown: {
            input: inputTokens * pricing.prompt,
            output: outputTokens * pricing.completion
          }
        };
      }

      function formatModelName(name) {
        return name.replace(/-/g, " ").replace(/\b\w/g, (l) => l.toUpperCase());
      }

      function createModelBox(modelName, data, pricing) {
        const el = document.createElement("div");
        el.className = "model-box";
        const revenue = calculateRevenue(data, pricing);

        el.innerHTML = `
          <div class="model-name">${formatModelName(modelName)}</div>
          <div class="model-tokens">
            <div class="item"><div class="label">Input</div><div class="value">${(data.input_tokens || 0).toLocaleString()}</div></div>
            <div class="item"><div class="label">Output</div><div class="value">${(data.output_tokens || 0).toLocaleString()}</div></div>
          </div>
          <div class="revenue-section">
            <div class="revenue-item"><span class="revenue-label">Input Rev</span><span class="revenue-amount">$${revenue.breakdown.input.toFixed(2)}</span></div>
            <div class="revenue-item"><span class="revenue-label">Output Rev</span><span class="revenue-amount">$${revenue.breakdown.output.toFixed(2)}</span></div>
          </div>
          <div class="total-line"><div class="muted">Total Revenue</div><div class="revenue-amount">$${revenue.total.toFixed(2)}</div></div>
        `;
        return el;
      }

      function createChart(models, chartType) {
        const canvas = document.getElementById("tokenChart");
        const ctx = canvas.getContext("2d");
        if (tokenChart) tokenChart.destroy();

        const labels = models.map(([name]) => formatModelName(name));
        const chartData = { labels, datasets: [] };

        if (chartType === 'tokens') {
          chartData.datasets.push({
            label: "Total Tokens",
            data: models.map(([, d]) => d.total_tokens || 0),
            backgroundColor: "rgba(110, 72, 170, 0.4)",
            borderColor: "rgba(110, 72, 170, 1)",
            borderWidth: 1, borderRadius: 6,
          });
        } else {
          chartData.datasets.push({
            label: "Estimated Revenue",
            data: models.map(([, d, pricing]) => calculateRevenue(d, pricing).total),
            backgroundColor: "rgba(76, 175, 80, 0.4)",
            borderColor: "rgba(76, 175, 80, 1)",
            borderWidth: 1, borderRadius: 6,
          });
        }

        tokenChart = new Chart(ctx, {
          type: "bar",
          data: chartData,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: 'nearest',
              axis: 'x',
              intersect: false
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: "#292929" }
              },
              x: {
                grid: { color: "#292929" },
                ticks: { maxRotation: 45, minRotation: 45 }
              }
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                enabled: true,
                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                titleFont: { size: 14, weight: 'bold' },
                bodyFont: { size: 13 },
                padding: 12,
                displayColors: true,
                callbacks: {
                  label: function(context) {
                    let label = context.dataset.label || '';
                    if (label) {
                      label += ': ';
                    }
                    if (context.parsed.y !== null) {
                      label += currentChartType === 'tokens'
                        ? context.parsed.y.toLocaleString()
                        : '$' + context.parsed.y.toFixed(4);
                    }
                    return label;
                  }
                }
              }
            },
            datasets: {
              bar: {
                minBarLength: 5
              }
            }
          }
        });
      }

      function switchChart(type) {
        currentChartType = type;
        document.getElementById('token-btn').classList.toggle('active', type === 'tokens');
        document.getElementById('revenue-btn').classList.toggle('active', type === 'revenue');
        const grid = document.getElementById('models-grid');
        if (grid.dataset.models) createChart(JSON.parse(grid.dataset.models), type);
      }

      async function updateDashboard() {
        const grid = document.getElementById("models-grid");
        const selectedStamp = document.getElementById('stamp-selector').value;
        const isCurrent = selectedStamp === 'current';

        const usageUrl = isCurrent
            ? "/admin-api/usage"
            : `/admin-api/usagestamp/${selectedStamp}`;

        const mauUrl = isCurrent
            ? "/admin-api/mau"
            : `/admin-api/mau-stamp/${selectedStamp}`;

        grid.innerHTML = `<div class="loading">Loading usage data...</div>`;

        try {
          // Fetch MAU data - now supports both current and historical stamps
          let mauPromise = fetch(mauUrl)
            .then(res => res.ok ? res.json() : null)
            .catch(() => null);

          const [usageRes, pricingMap, mauData] = await Promise.all([
            fetch(usageUrl),
            fetchModelPricing(),
            mauPromise
          ]);

          if (!usageRes.ok) throw new Error(`HTTP error ${usageRes.status}`);
          const usageData = await usageRes.json();
          const modelEntries = Object.entries(usageData);

          let totalRevenue = 0;
          const enrichedModels = modelEntries.map(([name, data]) => {
            const pricing = pricingMap[name] || { prompt: 0, completion: 0 };
            const revenue = calculateRevenue(data, pricing);
            totalRevenue += revenue.total;
            return [name, data, pricing];
          }).sort((a, b) => (b[1].total_tokens || 0) - (a[1].total_tokens || 0));

          const grandTotal = enrichedModels.reduce((sum, [, d]) => sum + (d.total_tokens || 0), 0);

          // Update MAU Box - handles both current and historical data
          let mauValue = "N/A";
          if (mauData !== null) {
              // Gracefully handle different potential JSON responses {mau: 100}, {count: 100}, or just a raw number 100
              mauValue = typeof mauData === 'number'
                  ? mauData.toLocaleString()
                  : (mauData.mau || mauData.count || Object.values(mauData)[0] || 0).toLocaleString();
          }
          document.getElementById("mau-count").textContent = mauValue;

          // Update other stats
          document.getElementById("grand-total").textContent = grandTotal.toLocaleString();
          document.getElementById("model-count").textContent = enrichedModels.length.toString();
          document.getElementById("grand-revenue").textContent = `$${totalRevenue.toFixed(2)}`;
          grid.dataset.models = JSON.stringify(enrichedModels);

          grid.innerHTML = "";
          enrichedModels.forEach(([name, data, pricing], idx) => {
            const card = createModelBox(name, data, pricing);
            card.style.animationDelay = `${Math.min(idx * 60, 600)}ms`;
            grid.appendChild(card);
          });

          createChart(enrichedModels, currentChartType);
          document.getElementById("update-time").textContent = new Date().toLocaleString();
        } catch (e) {
          grid.innerHTML = `<div class="error">Error: ${e.message}</div>`;
        }
      }

      // Initialize
      fetchStamps();
      updateDashboard();

      setInterval(() => {
          if(document.getElementById('stamp-selector').value === 'current') updateDashboard();
      }, 300000);
    </script>
</body>
</html>
