<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default("dark") }}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="https://files.nahcrof.com/file/crofaicolor.png" />
        <title>CrofAI - Pager Messages</title>
        <link rel="stylesheet" href="/ui/crofui.css" />
        <style>
            :root {
                --border: #2e2e2e;
                --bg: #000000;
                --panel: #0a0a0a;
                --text: #a0a0a0;
                --bright: #ffffff;
                --bright-text: #b19cd9;
            }

            [data-theme="light"] {
                --border: #e4e4e7;
                --bg: #ffffff;
                --panel: #f7f7f8;
                --text: #555555;
                --bright: #111111;
                --bright-text: #7c3aed;
            }

            [data-theme="light"] .admin-badge {
                background: #f3eefc;
                border-color: #d9cff3;
            }
            [data-theme="light"] .msg-item:hover {
                background: rgba(0, 0, 0, 0.03);
            }
            [data-theme="light"] .msg-footer {
                color: #999;
            }
            [data-theme="light"] .btn-test {
                color: #fff;
            }

            body {
                margin: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                background-color: var(--bg);
                color: var(--text);
                overflow: hidden;
            }

            header {
                height: 70px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0 20px;
                flex-shrink: 0;
            }

            #nav-header {
                width: 100%;
                max-width: 1200px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .logo { height: 35px; width: auto; }

            /* Professional Nav Styling */
            .nav-links { 
                display: flex; 
                align-items: center; 
                gap: 10px; 
            }

            .nav-links .link {
                color: var(--text);
                text-decoration: none;
                font-size: 0.9rem;
                padding: 8px 14px;
                border-radius: 12px;
                transition: 0.3s ease;
            }

            .nav-links .link:hover {
                background: var(--palette-bg-5);
                color: var(--bright-text);
            }

            /* Overriding btn for auto width and consistency */
            .btn {
                width: auto !important;
                padding: 8px 16px;
                text-decoration: none;
                font-size: 0.9rem;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .pager-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                max-width: 900px;
                width: 95%;
                margin: 0 auto;
                overflow: hidden;
                padding: 20px 0;
            }

            .pager-header {
                margin-bottom: 20px;
                padding: 0 10px;
            }

            .pager-header h1 {
                font-size: 1.8rem;
                margin: 5px 0 0 0;
                color: var(--bright);
            }

            .admin-badge {
                padding: 4px 10px;
                background: #181122;
                border: 1px solid #261f3a;
                border-radius: 12px;
                color: var(--bright-text);
                font-size: 0.7rem;
                font-weight: bold;
                text-transform: uppercase;
            }

            .messages-window {
                flex: 1;
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 8px;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent;
            }

            .msg-item {
                background: var(--palette-overlay-0);
                border-left: 2px solid var(--border);
                padding: 12px 16px;
                transition: 0.2s;
            }

            .msg-item:hover {
                border-left-color: var(--bright-text);
                background: rgba(255, 255, 255, 0.04);
            }

            .msg-content {
                color: var(--bright);
                font-size: 0.95rem;
                line-height: 1.5;
                font-family: 'JetBrains Mono', monospace;
            }

            .msg-footer {
                margin-top: 6px;
                font-size: 0.7rem;
                color: #444;
            }

            .pager-footer {
                padding: 20px 10px;
                display: flex;
                justify-content: center;
                flex-shrink: 0;
            }

            /* Submit style for test button */
            .btn-test {
                background: var(--bright);
                color: #000;
                border: none;
                padding: 14px 28px;
                border-radius: 6px;
                font-weight: 700;
                cursor: pointer;
                transition: opacity 0.2s;
            }

            .btn-test:hover { opacity: 0.9; }

            @media (max-width: 600px) {
                .nav-links .link { display: none; } /* Focus on Sign Out for mobile */
                .pager-container { width: 100%; padding: 10px; }
            }
        </style>
    </head>
    <body>

    <header>
        <div id="nav-header">
            <a href="/"><img class="logo" src="https://files.nahcrof.com/file/crofai-black.png"></a>
            <nav class="nav-links">
                <a class="link" href="/admin">Admin</a>
                <a class="link" href="/docs">Docs</a>
                <a class="btn" href="/signout">Sign Out</a>
            </nav>
        </div>
    </header>

    <main class="pager-container">
        <div class="pager-header">
            <span class="admin-badge">Secure Pager</span>
            <h1>Incident Logs</h1>
        </div>

        <div class="messages-window" id="messageContainer">
            {% for msg in messages %}
            <div class="msg-item">
                <div class="msg-content">{{ msg }}</div>
                <div class="msg-footer">
                    TIMESTAMP: LOG_ENTRY_{{ loop.index }}
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="pager-footer">
            <button class="btn-white" style="width: auto;" onclick="testPager()">
                Trigger System Pager
            </button>
        </div>
    </main>

    <script src="/ui/crofui.js"></script>
    <script>
        const container = document.getElementById('messageContainer');
        
        // Ensure scroll starts at the bottom
        window.onload = () => {
            container.scrollTop = container.scrollHeight;
        };

        async function testPager() {
            try {
                if (typeof createToast === 'function') {
                    createToast("Paging system...");
                }
                await fetch('/admin-api/pager');
            } catch (error) {
                console.error("API Fetch Error");
            }
        }
    </script>
</body>
</html>
