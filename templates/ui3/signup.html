<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default("dark") }}">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link
            rel="icon"
            href="https://files.nahcrof.com/file/crofaicolor.png"
        />
        <meta
            name="description"
            content="The cheapest inference provider for large models"
        />
        <title>CrofAI - Sign Up</title>
	<link rel="stylesheet" href="/ui/crofui.css">

	<style>
    * {
      box-sizing: border-box;
    }
	    .logo {
		height: 50px;
		width: auto;
	    }

	    header {
		margin-top: 25px;
		/*margin-left: 15vw;*/
		margin-left: 15px;
		display: flex;
	    }

	    a {
		color: var(--bright);
	    }

	    a:hover {
		text-decoration: none;
	    }

	    header nav {
		margin-left: auto;
		margin-right: 15px;
		margin-top: 20px;
	    }

	    header .link {
		margin-left: 20px;
		color: var(--link-text);
		border: 1px solid transparent;
		width: auto;
		height: 17px;
		padding-top: 7px;
		padding-bottom: 7px;
		padding-left: 10px;
		padding-right: 10px;
		border-radius: 14px;
		text-decoration: none;
		transition: 0.3s ease;
	    }
	    header .link:hover{
		background: var(--hover-background);
		color: var(--text);
	    }

	    header .btn{
		margin-left: 20px;
	    }

	    .hero{
		margin-top: 35vh;
		text-align: center;
	    }

	    .hero h1{
		font-size: 3rem;
		color: #808080;
		display: flex;
		justify-content: center;
	    }

	    .hero h1 .pretty{
		margin-right: 0.5rem;
		font-weight: bold;
		background: linear-gradient(90deg, #9B30FF, #4169E1);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		background-clip: text;
	    }
	    .form-wrapper {
		display: flex;
		justify-content: center;
	    }

	    .form-box {
		padding: 50px;
		border-radius: 12px;
		background-color: transparent;
		border: 1px solid var(--border);
		margin-top: 25vh;
	    }

	    .form-box .btn-white {
		width: 100%;
	    }

	    .form-box input{
		margin-bottom: 20px;
	    }

	    .form-box input: focus{
		outline: none;
		border-color: var(--bright);
	    }

	    .form-box h2{
		text-align: center;
	    }

	    .blank {
		margin-left: 20px;
		color: transparent;
		border: 1px solid transparent;
		width: auto;
		height: 17px;
		padding-top: 7px;
		padding-bottom: 7px;
		padding-left: 10px;
		padding-right: 10px;
		border-radius: 14px;
		text-decoration: none;
		transition: 0.3s ease;
	    }

	    .blank:hover{
		cursor: default;
	    }

	    .wrong-page {
		margin-top: 10px;
		text-align: center;
	    }

	    .divider {
		display: flex;
		align-items: center;
		margin: 20px 0;
		color: var(--link-text);
		font-size: 0.85rem;
	    }
	    .divider::before, .divider::after {
		content: "";
		flex: 1;
		height: 1px;
		background: var(--border);
	    }
	    .divider span {
		padding: 0 12px;
	    }

	    .btn-google {
		width: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 10px;
		padding: 10px 20px;
		border-radius: 8px;
		border: 1px solid var(--border);
		background: transparent;
		color: var(--text);
		font-size: 0.9rem;
		font-family: inherit;
		cursor: pointer;
		transition: 0.3s ease;
		text-decoration: none;
	    }
	    .btn-google:hover {
		background: var(--hover-background);
		border-color: #555;
	    }
	    .btn-google svg {
		width: 18px;
		height: 18px;
		flex-shrink: 0;
	    }

	</style>

    </head>
    <body>

	<header>
	    <a href="/"><img class="logo" src="https://files.nahcrof.com/file/crofai-black.png"></a>
	    <nav>
		<a class="btn" href="/signin">Sign In</a>
	    </nav>
	</header>

	<div class="form-wrapper">
	    <div class="form-box">
		<h2>Join CrofAI</h2>
		<form action="#" method="POST" id="signup-form">
		    <div>
			<input placeholder="username" type="text" id="username" name="username" class="input" required>
		    </div>
		    <div>
			<input placeholder="password" type="password" id="password" name="password" class="input" required>
		    </div>
		    <button class="btn-white" type="submit">Create Account</button>
		</form>
		<div class="divider"><span>or</span></div>
		<a class="btn-google" href="/auth/google">
		    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
		    Continue with Google
		</a>
		<div class="wrong-page">Already have an account?<br> <a href="/signin">Sign In</a></div>
	    </div>
	</div>

	<script src="/ui/crofui.js"></script>
	<script type="module">
function generatePassword(len) {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, x => chars[x % chars.length]).join('');
}

function deriveUsername(email) {
  return email.split('@')[0].replace(/[^a-zA-Z0-9_-]/g, '');
}

if (navigator.credentials && window.PasswordCredential) {
  const signupForm = document.getElementById('signup-form');
  signupForm.innerHTML =
    '<div>' +
    '  <input placeholder="email" type="email" id="email" name="email" class="input" autocomplete="email" required>' +
    '  <p>You\'ll be able to save your account to your browser or anywhere else once you create it.</p>' +
    '</div>' +
    '<button class="btn-white" type="submit">Create Account</button>';

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      createToast('Please enter a valid email');
      return;
    }

    const username = deriveUsername(email);
    const password = generatePassword(20);

    const params = new URLSearchParams();
    params.append('username', username);
    params.append('password', password);

    try {
      const response = await fetch(window.location.pathname, {
        method: 'POST',
        body: params,
        credentials: 'same-origin'
      });
      const target = new URL(response.url);
      if (target.pathname === '/signup') {
        const html = await response.text();
        const match = html.match(/createToast\("([^"]*)"\)/);
        createToast(match ? match[1] : 'Sign up failed');
        return;
      }

      try {
        await fetch('/settings-api/update-email/' + encodeURIComponent(email), {
          credentials: 'same-origin'
        });
      } catch {}

      navigator.credentials.store(
        new PasswordCredential({ id: username, password, name: email })
      );

      const formBox = document.querySelector('.form-box');
      formBox.innerHTML =
        '<h2>Save your credentials</h2>' +
        '<p>Save the username and password below to your browser.</p>' +
        '<p><strong>Username:</strong> <span style="user-select: all;">' + username + '</span></p>' +
        '<p><strong>Password:</strong> <span style="user-select: all; word-break: break-all;">' + password + '</span></p>' +
        '<button class="btn-white" id="continue-btn" type="button">Continue</button>';

      const poll = setInterval(async () => {
        try {
          const c = await navigator.credentials.get({ password: true, mediation: 'optional' });
          if (!c) return;
          if (c.id != username) {
            clearInterval(poll);
            return;
          }
          window.location.href = response.url;
        } catch {}
      }, 500);

      document.getElementById('continue-btn').addEventListener('click', () => {
        clearInterval(poll);
        window.location.href = response.url;
      });
    } catch (err) {
      console.error(err);
      createToast('An error occurred');
    }
  });
}
	</script>
	{% if error_message %}
	    <script>
		// alert("{{error_message}}");
		createToast("{{error_message}}");
	    </script>
	{% endif %}
    </body>
</html>
