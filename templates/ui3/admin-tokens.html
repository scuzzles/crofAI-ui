    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Counter - CrofAI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6e48aa;
            --secondary: #9d50bb;
            --accent: #4776e6;
            --dark-bg: #121212;
            --darker-bg: #0a0a0a;
            --text: #e0e0e0;
            --text-light: #b0b0b0;
            --success: #4CAF50;
            --warning: #FFC107;
            --danger: #F44336;
        }

        [data-theme="light"] {
            --dark-bg: #f7f7f8;
            --darker-bg: #ededef;
            --text: #111111;
            --text-light: #555555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Dashboard header */
        .dashboard-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 0 20px;
        }

        .dashboard-title {
            font-size: 36px;
            margin-bottom: 15px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .dashboard-subtitle {
            color: var(--text-light);
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.1rem;
        }

        /* Total tokens counter */
        .total-tokens-counter {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 15px;
            padding: 25px;
            margin: 0 auto 40px;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(110, 72, 170, 0.3);
            border: 1px solid var(--palette-overlay-2);
            animation: fadeInUp 0.8s ease-out;
        }

        .counter-label {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .counter-value {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* Model cards */
        .model-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .model-card {
            background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--palette-overlay-1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .model-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .model-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .model-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .token-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .token-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .token-label {
            font-weight: 500;
            color: var(--text-light);
        }

        .token-value {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
        }

        .total-tokens {
            background-color: var(--darker-bg);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid rgba(110, 72, 170, 0.3);
        }

        .total-label {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .total-value {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .last-updated {
            text-align: center;
            margin-top: 40px;
            color: var(--text-light);
            font-size: 0.9rem;
            padding: 20px 0;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .error {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--danger);
        }

        footer {
            background-color: var(--darker-bg);
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 60px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--text);
        }

        .copyright {
            color: var(--text-light);
            font-size: 14px;
        }

        /* Chart section */
        .chart-section {
            margin: 60px 0 40px;
            padding: 30px;
            background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--palette-overlay-1);
        }

        .chart-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        /* Token Counter Section */
        .token-counter-section {
            margin: 40px 0;
            padding: 30px;
            background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--palette-overlay-1);
        }

        .counter-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text);
        }

        .counter-input {
            width: 100%;
            padding: 15px;
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid rgba(110, 72, 170, 0.3);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 20px;
            min-height: 150px;
        }

        .counter-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .counter-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .counter-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .counter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(110, 72, 170, 0.4);
        }

        .counter-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .counter-result {
            text-align: center;
            padding: 20px;
            background: rgba(30, 30, 30, 0.7);
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .result-label {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .dashboard-title {
                font-size: 28px;
            }

            .counter-value {
                font-size: 2.5rem;
            }

            .model-cards {
                grid-template-columns: 1fr;
            }

            .chart-container {
                height: 300px;
            }

            .counter-controls {
                flex-direction: column;
                align-items: center;
            }

            .counter-btn {
                width: 100%;
                max-width: 300px;
            }
        }

        /* Animation for fade-in */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>


    <div class="container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Token Usage Dashboard</h1>
            <p class="dashboard-subtitle">Monitor your AI model token consumption in real-time</p>
        </div>

        <!-- Token Counter Section -->
        <div class="token-counter-section">
            <h2 class="counter-title">Token Counter</h2>
            <textarea class="counter-input" id="textInput" placeholder="Enter your text here to count tokens..."></textarea>
            <div class="counter-controls">
                <button class="counter-btn" id="countBtn">Count Tokens</button>
                <button class="counter-btn" id="clearBtn">Clear Text</button>
            </div>
            <div class="counter-result" id="result">
                <div class="result-label">Total Tokens</div>
                <div class="result-value" id="tokenCount">0</div>
            </div>
        </div>


    </div>

    <script>
        let tokenChart = null;
        let tokenCount = 0;

        // DOM Elements
        const textInput = document.getElementById('textInput');
        const countBtn = document.getElementById('countBtn');
        const clearBtn = document.getElementById('clearBtn');
        const result = document.getElementById('result');
        const tokenCountElement = document.getElementById('tokenCount');
        const grandTotalElement = document.getElementById('grand-total');
        const dashboard = document.getElementById('dashboard');
        const updateTimeElement = document.getElementById('update-time');

        // Initialize the dashboard
        document.addEventListener('DOMContentLoaded', function() {
            updateDashboard();
            updateTimeElement.textContent = new Date().toLocaleString();
        });

        // Count tokens button event
        countBtn.addEventListener('click', countTokens);

        // Clear text button event
        clearBtn.addEventListener('click', function() {
            textInput.value = '';
            result.style.display = 'none';
        });

        // Allow Enter key to trigger counting (Shift+Enter for new line)
        textInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                countTokens();
            }
        });

        async function countTokens() {
            const text = textInput.value.trim();

            if (!text) {
                alert('Please enter some text to count tokens.');
                return;
            }

            // Show loading state
            countBtn.disabled = true;
            countBtn.textContent = 'Processing...';
            result.style.display = 'none';

            try {
                // Send request to API endpoint
                const response = await fetch('tokens-counter-api', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Get token count from API response
                const tokenCount = await response.json();

                // Display result
                tokenCountElement.textContent = tokenCount;
                result.style.display = 'block';

                // Update grand total (simulated)
                const grandTotal = 12500 + tokenCount;
                grandTotalElement.textContent = grandTotal.toLocaleString();
            } catch (error) {
                console.error('Error counting tokens:', error);
            } finally {
                // Re-enable button
                countBtn.disabled = false;
                countBtn.textContent = 'Count Tokens';
            }
        }


    </script>
