name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML validity
        run: |
          sudo apt-get install -y tidy
          for f in *.html; do
            tidy -e -q "$f" 2>/dev/null && echo "OK: $f" || echo "WARN: $f"
          done
